---
# Erlang CI — the `rebar3 precommit` gate that contributors run locally
# (fmt-check, compile, xref, hank, dialyzer, ex_doc, eunit + ct with cover,
# 100 % line-coverage) is split here into parallel, independently-named jobs
# so each signal lands as its own check on the PR dashboard and the wall time
# is the slowest single job instead of the serial sum. External conformance
# harnesses (h2spec, Autobahn) and the wrk2 smoke back the README's Status
# claims.
#
# Job dependency structure (all fan out from cache-erlang, run in parallel):
# - cache-erlang: sets up Erlang, computes cache keys, compiles + caches
#                 _build / rebar3. Exposes cache keys as outputs.
# - Lint:      fmt-check + xref + hank + ex_doc (fast static checks).
# - Dialyzer:  PLT analysis on its own (slow, independent).
# - Test:      eunit + ct (both with cover), then the aggregated 100 %
#              coverage gate — kept in one job because the gate sums the
#              eunit + ct coverdata, which must share a workspace.
# - h2spec / autobahn / wrk2-smoke: conformance + smoke harnesses.
#
# The shared checkout + setup-beam + cache-restore boilerplate lives in the
# `./.github/actions/setup-erlang` composite action.
name: Erlang

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch: {}
  merge_group:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cache-erlang:
    name: Cache Erlang

    runs-on: ubuntu-24.04

    outputs:
      build-cache-key: ${{ steps.set-build-key.outputs.key }}
      build-cache-prefix: ${{ steps.set-build-key.outputs.prefix }}
      rebar-cache-key: ${{ steps.set-rebar-key.outputs.key }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24
        id: setup-beam
        with:
          version-type: strict
          version-file: .tool-versions

      - name: Set build cache key
        id: set-build-key
        run: |
          # Key is per-commit so each push gets its own _build cache.
          # actions/cache is immutable per key: a key-based cache hit
          # skips the post-step upload, so without the SHA component
          # branches that don't touch rebar.config / rebar.lock would
          # all share main's cache and downstream jobs (h2spec,
          # wrk2-smoke) would run against main's stale .beam files
          # even after cache-erlang recompiled this branch's source.
          # restore-keys (the prefix) gives a fresh SHA a warm start
          # from the most recent matching cache.
          os="${{ runner.os }}"
          otp="${{ steps.setup-beam.outputs.otp-version }}"
          cfg_hash="${{ hashFiles('rebar.config') }}"
          lock_hash="${{ hashFiles('rebar.lock') }}"
          prefix="_build-${os}-otp-${otp}-cfg-${cfg_hash}-lock-${lock_hash}-"
          echo "prefix=${prefix}" >> "${GITHUB_OUTPUT}"
          echo "key=${prefix}sha-${{ github.sha }}" >> "${GITHUB_OUTPUT}"

      - name: Set rebar cache key
        id: set-rebar-key
        run: |
          echo "key=\
          rebar3-\
          ${{ runner.os }}-\
          otp-${{ steps.setup-beam.outputs.otp-version }}-\
          rebar3-${{ steps.setup-beam.outputs.rebar3-version }}-\
          config-${{ hashFiles('rebar.config') }}" \
          >> "${GITHUB_OUTPUT}"

      - name: Cache _build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: _build
          key: ${{ steps.set-build-key.outputs.key }}
          restore-keys: ${{ steps.set-build-key.outputs.prefix }}

      - name: Cache rebar3
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/rebar3
          key: ${{ steps.set-rebar-key.outputs.key }}
          restore-keys: |
            rebar3-${{ runner.os }}-otp-${{ steps.setup-beam.outputs.otp-version }}-
            rebar3-${{ runner.os }}-

      - name: Compile test profile
        run: rebar3 as test compile

  # Fast static checks: fmt-check + xref + hank + ex_doc. All run in seconds,
  # so they share one job rather than paying the runner-setup tax four times.
  lint:
    name: Lint

    needs: cache-erlang

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-erlang
        with:
          build-cache-key: ${{ needs.cache-erlang.outputs.build-cache-key }}
          build-cache-prefix: ${{ needs.cache-erlang.outputs.build-cache-prefix }}
          rebar-cache-key: ${{ needs.cache-erlang.outputs.rebar-cache-key }}

      - name: Run lint (fmt-check, xref, hank, doc)
        run: make lint

  # Dialyzer on its own: it's the slowest non-test stage and fully independent,
  # so isolating it keeps a type error from hiding behind the test run and lets
  # it run parallel to Test instead of before it.
  dialyzer:
    name: Dialyzer

    needs: cache-erlang

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-erlang
        with:
          build-cache-key: ${{ needs.cache-erlang.outputs.build-cache-key }}
          build-cache-prefix: ${{ needs.cache-erlang.outputs.build-cache-prefix }}
          rebar-cache-key: ${{ needs.cache-erlang.outputs.rebar-cache-key }}

      - name: Run dialyzer
        run: make dialyzer

  # eunit + ct + the 100 % coverage gate. The gate sums the eunit and ct
  # coverdata (the suite deliberately splits coverage between them), so all
  # three must run in one job to share `_build/test/cover/`.
  test:
    name: Test

    needs: cache-erlang

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-erlang
        with:
          build-cache-key: ${{ needs.cache-erlang.outputs.build-cache-key }}
          build-cache-prefix: ${{ needs.cache-erlang.outputs.build-cache-prefix }}
          rebar-cache-key: ${{ needs.cache-erlang.outputs.rebar-cache-key }}

      - name: Run eunit + ct (with cover)
        run: make eunit ct

      - name: Coverage gate (100 %)
        run: make cover

  # HTTP/2 conformance — backs the README "h2spec strict 100 %" claim.
  # Runs in parallel with the quality jobs so a lint/fmt issue doesn't block
  # the conformance signal.
  h2spec:
    name: h2spec (HTTP/2 conformance)

    needs: cache-erlang

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-erlang
        with:
          build-cache-key: ${{ needs.cache-erlang.outputs.build-cache-key }}
          build-cache-prefix: ${{ needs.cache-erlang.outputs.build-cache-prefix }}
          rebar-cache-key: ${{ needs.cache-erlang.outputs.rebar-cache-key }}

      - name: Run h2spec strict
        run: ./scripts/h2spec.sh

  # WebSocket conformance — backs the README "Autobahn fuzzingclient
  # strict 100 %" claim. Slow (~5 min) — runs only on push to main,
  # merge_group, and manual dispatch, not every PR. Use
  # `workflow_dispatch` to trigger on a feature branch when WS code
  # is touched.
  autobahn:
    name: autobahn (WebSocket conformance)

    needs: cache-erlang

    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group'

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-erlang
        with:
          build-cache-key: ${{ needs.cache-erlang.outputs.build-cache-key }}
          build-cache-prefix: ${{ needs.cache-erlang.outputs.build-cache-prefix }}
          rebar-cache-key: ${{ needs.cache-erlang.outputs.rebar-cache-key }}

      - name: Run Autobahn fuzzingclient
        run: ./scripts/autobahn.escript

  # wrk2 smoke — verifies the open-loop bench pipeline (Docker
  # cylab/wrk2 + bench.escript --standalone + HdrHistogram parsing
  # + Lua POST scripts) still works end-to-end. Catches breakage,
  # NOT regression: CI runner numbers are too noisy for tail-latency
  # claims, so the canonical `docs/wrk2_results.md` always comes
  # from a quiet local box. Two scenarios: `hello` (GET path) and
  # `echo` (POST path via Lua) so a broken Lua script also fails
  # the smoke. Runs on every push + PR; ~2 min total.
  wrk2-smoke:
    name: wrk2 smoke

    needs: cache-erlang

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-erlang
        with:
          build-cache-key: ${{ needs.cache-erlang.outputs.build-cache-key }}
          build-cache-prefix: ${{ needs.cache-erlang.outputs.build-cache-prefix }}
          rebar-cache-key: ${{ needs.cache-erlang.outputs.rebar-cache-key }}

      - name: Run wrk2 smoke (hello + echo, --quick, 10s)
        run: |
          ./scripts/wrk2_bench.sh --quick --scenarios hello,echo \
              --duration 10 --server roadrunner \
              --out /tmp/wrk2_smoke.md

      - name: Verify smoke output structure
        run: |
          set -euo pipefail
          out=/tmp/wrk2_smoke.md
          [ -s "$out" ] || { echo "smoke output empty"; exit 1; }
          # Both scenarios must render their tables.
          grep -q '^## `hello`'  "$out" || { echo "missing hello section"; exit 1; }
          grep -q '^## `echo`'   "$out" || { echo "missing echo section"; exit 1; }
          # Both views (corrected + uncorrected) must be present.
          grep -q 'CO-corrected' "$out" || { echo "missing CO-corrected table"; exit 1; }
          grep -q 'Uncorrected'  "$out" || { echo "missing Uncorrected table"; exit 1; }
          # Roadrunner must have at least one populated row in the
          # corrected table — proves the standalone listener came up
          # and the HdrHistogram parser pulled a value.
          grep -E '^\| roadrunner \| .* \| .*ms \| .*ms \|' "$out" \
              || { echo "no parsed roadrunner row"; exit 1; }
          echo "smoke ok"
