---
# Erlang CI — runs the same `rebar3 precommit` gate contributors run
# locally (fmt-check, compile, xref, dialyzer, eunit + ct with cover,
# 100 % line-coverage gate).
name: Erlang

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch: {}
  merge_group:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  precommit:
    name: precommit

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24
        id: setup-beam
        with:
          version-type: strict
          version-file: .tool-versions

      - name: Cache _build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: _build
          key: >-
            _build-${{ runner.os }}-otp-${{ steps.setup-beam.outputs.otp-version }}-cfg-${{
              hashFiles('rebar.config') }}-lock-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            _build-${{ runner.os }}-otp-${{ steps.setup-beam.outputs.otp-version }}-cfg-${{ hashFiles('rebar.config') }}-

      - name: Cache rebar3
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/rebar3
          key: >-
            rebar3-${{ runner.os }}-otp-${{ steps.setup-beam.outputs.otp-version }}-rebar3-${{
              steps.setup-beam.outputs.rebar3-version }}-cfg-${{ hashFiles('rebar.config') }}
          restore-keys: |
            rebar3-${{ runner.os }}-otp-${{ steps.setup-beam.outputs.otp-version }}-
            rebar3-${{ runner.os }}-

      - name: Run precommit
        run: rebar3 precommit
